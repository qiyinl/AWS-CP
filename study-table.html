<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Study Table - Complete Reference</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="study-table.css">
</head>

<body>
    <div class="top-header">
        <div class="logo">
            <span>☁️</span> AWS Study Table
        </div>
        <a href="index.html" class="back-link">← Back to Home</a>
    </div>
    <div class="container">
        <header>
            <h1>Complete Study Reference</h1>
            <p>Complete reference of services, keywords and descriptions</p>
        </header>
        <div class="controls">
            <div class="search-filter">
                <input type="text" class="search-box" id="searchBox"
                    placeholder="🔍 Search by keyword, service or description...">
            </div>
            <div class="unit-filters" id="unitFilters">
                <!-- Generated by JS -->
            </div>
            <div class="export-btns">
                <button class="export-btn export-pdf" id="exportPdf">📥 Export PDF</button>
                <button class="export-btn export-csv" id="exportCsv">📊 Export CSV</button>
                <button class="export-btn export-anki" id="exportAnki">🎴 Anki Format</button>
            </div>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 50px;">⭐</th>
                        <th style="width: 150px;">Unit</th>
                        <th style="width: 250px;">Keyword / Hint</th>
                        <th>AWS Service → Description</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Generated by JS -->
                </tbody>
            </table>
            <div id="emptyState" class="empty-state" style="display: none;">
                <div class="empty-state-icon">🔍</div>
                <h3>No results found</h3>
                <p>Try different search terms</p>
            </div>
        </div>
        <div class="stats">
            <h3>Study Statistics</h3>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="totalItems">0</div>
                    <div class="stat-label">Total Items</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalUnits">0</div>
                    <div class="stat-label">Units</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="starredItems">0</div>
                    <div class="stat-label">⭐ Starred</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="filteredItems">0</div>
                    <div class="stat-label">Showing</div>
                </div>
            </div>
        </div>
    </div>
    <script src="flashcards-data.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        const state = {
            data: flashcardsData,
            filteredData: flashcardsData,
            activeFilters: new Set(['all']),
            searchTerm: '',
            starred: new Set(JSON.parse(localStorage.getItem('starred') || '[]'))
        };

        const elements = {
            searchBox: document.getElementById('searchBox'),
            unitFilters: document.getElementById('unitFilters'),
            tableBody: document.getElementById('tableBody'),
            emptyState: document.getElementById('emptyState'),
            totalItems: document.getElementById('totalItems'),
            totalUnits: document.getElementById('totalUnits'),
            starredItems: document.getElementById('starredItems'),
            filteredItems: document.getElementById('filteredItems'),
            exportPdf: document.getElementById('exportPdf'),
            exportCsv: document.getElementById('exportCsv'),
            exportAnki: document.getElementById('exportAnki')
        };

        function init() {
            renderFilters();
            filterData();
            renderTable();
            updateStats();
            setupEventListeners();
        }

        function renderFilters() {
            const units = ['all', ...new Set(state.data.map(item => item.unit))];
            elements.unitFilters.innerHTML = units.map(unit => `
                <button class="filter-btn ${unit === 'all' ? 'active' : ''}" data-unit="${unit}">
                    ${unit === 'all' ? '📚 All' : unit}
                </button>
            `).join('');
        }

        function getUnitBadgeClass(unit) {
            const classMap = {
                'Compute': 'badge-compute',
                'Storage': 'badge-storage',
                'Database': 'badge-database',
                'Networking': 'badge-networking',
                'Security': 'badge-security',
                'Management': 'badge-management',
                'Billing & Pricing': 'badge-billing'
            };
            return classMap[unit] || 'badge-default';
        }

        function renderTable() {
            if (state.filteredData.length === 0) {
                elements.tableBody.innerHTML = '';
                elements.emptyState.style.display = 'block';
                return;
            }

            elements.emptyState.style.display = 'none';
            elements.tableBody.innerHTML = state.filteredData.map((item, idx) => `
                <tr>
                    <td>
                        <span class="star-btn ${state.starred.has(idx) ? 'starred' : ''}" data-idx="${idx}">★</span>
                    </td>
                    <td>
                        <span class="unit-badge ${getUnitBadgeClass(item.unit)}">${item.unit}</span>
                    </td>
                    <td>
                        <div class="keyword">${item.keyword}</div>
                        ${item.hint ? `<div style="font-size: 0.85rem; color: #94a3b8; margin-top: 5px;">${item.hint}</div>` : ''}
                    </td>
                    <td>
                        <div class="service">${item.service}</div>
                        <div class="description">${item.description}</div>
                    </td>
                </tr>
            `).join('');
        }

        function filterData() {
            let filtered = state.data;

            // Filter by unit
            if (!state.activeFilters.has('all')) {
                filtered = filtered.filter(item => state.activeFilters.has(item.unit));
            }

            // Filter by search term
            if (state.searchTerm) {
                const term = state.searchTerm.toLowerCase();
                filtered = filtered.filter(item =>
                    item.keyword.toLowerCase().includes(term) ||
                    item.service.toLowerCase().includes(term) ||
                    item.description.toLowerCase().includes(term) ||
                    (item.hint && item.hint.toLowerCase().includes(term))
                );
            }

            state.filteredData = filtered;
        }

        function updateStats() {
            const units = new Set(state.data.map(item => item.unit));
            elements.totalItems.textContent = state.data.length;
            elements.totalUnits.textContent = units.size;
            elements.starredItems.textContent = state.starred.size;
            elements.filteredItems.textContent = state.filteredData.length;
        }

        function toggleStar(idx) {
            if (state.starred.has(idx)) {
                state.starred.delete(idx);
            } else {
                state.starred.add(idx);
            }
            localStorage.setItem('starred', JSON.stringify([...state.starred]));
            renderTable();
            updateStats();
        }

        function exportToCsv() {
            const headers = ['Unit', 'Keyword', 'Hint', 'Service', 'Description'];
            const rows = state.filteredData.map(item => [
                item.unit,
                item.keyword,
                item.hint || '',
                item.service,
                item.description
            ]);

            const csvContent = [
                headers.join(','),
                ...rows.map(row => row.map(cell => `"${cell}"`).join(','))
            ].join('\n');

            const blob = new Blob([csvContent], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'aws-study-table.csv';
            a.click();
        }

        function exportToAnki() {
            const ankiContent = state.filteredData.map(item =>
                `${item.keyword}; ${item.service}; ${item.description}`
            ).join('\n');

            const blob = new Blob([ankiContent], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'aws-anki-import.txt';
            a.click();
        }

        function exportToPdf() {
            const element = document.querySelector('.table-container');
            const opt = {
                margin: 10,
                filename: 'aws-study-table.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }

        function setupEventListeners() {
            elements.searchBox.addEventListener('input', (e) => {
                state.searchTerm = e.target.value;
                filterData();
                renderTable();
                updateStats();
            });

            elements.unitFilters.addEventListener('click', (e) => {
                if (e.target.classList.contains('filter-btn')) {
                    const unit = e.target.dataset.unit;

                    if (unit === 'all') {
                        state.activeFilters = new Set(['all']);
                        document.querySelectorAll('.filter-btn').forEach(btn => {
                            btn.classList.toggle('active', btn.dataset.unit === 'all');
                        });
                    } else {
                        state.activeFilters.delete('all');
                        document.querySelector('[data-unit="all"]').classList.remove('active');

                        if (state.activeFilters.has(unit)) {
                            state.activeFilters.delete(unit);
                            e.target.classList.remove('active');
                        } else {
                            state.activeFilters.add(unit);
                            e.target.classList.add('active');
                        }

                        if (state.activeFilters.size === 0) {
                            state.activeFilters.add('all');
                            document.querySelector('[data-unit="all"]').classList.add('active');
                        }
                    }

                    filterData();
                    renderTable();
                    updateStats();
                }
            });

            elements.tableBody.addEventListener('click', (e) => {
                if (e.target.classList.contains('star-btn')) {
                    const idx = parseInt(e.target.dataset.idx);
                    toggleStar(idx);
                }
            });

            elements.exportPdf.addEventListener('click', exportToPdf);
            elements.exportCsv.addEventListener('click', exportToCsv);
            elements.exportAnki.addEventListener('click', exportToAnki);
        }

        init();
    </script>
</body>

</html>
