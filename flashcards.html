<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Flashcards - Study System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="flashcards.css">
</head>

<body>
    <div class="top-header">
        <div class="logo">
            <span>☁️</span> AWS Flashcards
        </div>
        <a href="index.html" class="back-link">← Back to Home</a>
    </div>
    <div class="container">
        <header>
            <h1>Interactive Flashcards</h1>
            <p class="subtitle">Click on the card to see the answer</p>
        </header>
        <div class="unit-selector" id="unitSelector">
            <!-- Buttons generated by JS -->
        </div>
        <div class="flashcard-container">
            <div class="flashcard" id="flashcard">
                <div class="card-face card-front">
                    <div class="keyword" id="keyword"></div>
                    <div class="hint" id="hint"></div>
                    <div class="click-hint">👆 Click to see the answer</div>
                </div>
                <div class="card-face card-back">
                    <div class="service-name" id="serviceName"></div>
                    <div class="description" id="description"></div>
                </div>
            </div>
        </div>
        <div class="controls">
            <button class="btn btn-know" id="btnKnow">✓ I Know This</button>
            <button class="btn btn-learning" id="btnLearning">📚 Still Learning</button>
            <button class="btn btn-next" id="btnNext">→ Next</button>
        </div>
        <div class="progress">
            <div class="progress-text">Card <span id="currentCard">1</span> of <span id="totalCards">0</span></div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="knownCount">0</div>
                    <div class="stat-label">Known</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="learningCount">0</div>
                    <div class="stat-label">Learning</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="remainingCount">0</div>
                    <div class="stat-label">Remaining</div>
                </div>
            </div>
        </div>
    </div>
    <script src="flashcards-data.js"></script>
    <script>
        const state = {
            currentUnit: 'all',
            currentIndex: 0,
            cards: [],
            known: new Set(JSON.parse(localStorage.getItem('flashcards_known') || '[]')),
            learning: new Set(JSON.parse(localStorage.getItem('flashcards_learning') || '[]'))
        };

        const elements = {
            flashcard: document.getElementById('flashcard'),
            keyword: document.getElementById('keyword'),
            hint: document.getElementById('hint'),
            serviceName: document.getElementById('serviceName'),
            description: document.getElementById('description'),
            currentCard: document.getElementById('currentCard'),
            totalCards: document.getElementById('totalCards'),
            progressFill: document.getElementById('progressFill'),
            knownCount: document.getElementById('knownCount'),
            learningCount: document.getElementById('learningCount'),
            remainingCount: document.getElementById('remainingCount'),
            unitSelector: document.getElementById('unitSelector'),
            btnKnow: document.getElementById('btnKnow'),
            btnLearning: document.getElementById('btnLearning'),
            btnNext: document.getElementById('btnNext')
        };

        function init() {
            renderUnitSelector();
            filterCards();
            showCard();
            setupEventListeners();
        }

        function renderUnitSelector() {
            const units = ['all', ...new Set(flashcardsData.map(c => c.unit))];
            elements.unitSelector.innerHTML = units.map(unit => `
                <button class="unit-btn ${unit === 'all' ? 'active' : ''}" data-unit="${unit}">
                    ${unit === 'all' ? '📚 All' : unit}
                </button>
            `).join('');
        }

        function filterCards() {
            if (state.currentUnit === 'all') {
                state.cards = [...flashcardsData];
            } else {
                state.cards = flashcardsData.filter(c => c.unit === state.currentUnit);
            }
            state.currentIndex = 0;
            elements.totalCards.textContent = state.cards.length;
            updateStats();
        }

        function showCard() {
            if (state.cards.length === 0) return;

            const card = state.cards[state.currentIndex];

            // If card is flipped, unflip it first and wait for animation
            if (elements.flashcard.classList.contains('flipped')) {
                elements.flashcard.classList.remove('flipped');
                // Wait for flip animation to complete (0.6s) before updating content
                setTimeout(() => {
                    updateCardContent(card);
                }, 600);
            } else {
                updateCardContent(card);
            }
        }

        function updateCardContent(card) {
            elements.keyword.textContent = card.keyword;
            elements.hint.textContent = card.hint || '';
            elements.serviceName.textContent = card.service;
            elements.description.textContent = card.description;

            elements.currentCard.textContent = state.currentIndex + 1;
            const progress = ((state.currentIndex + 1) / state.cards.length) * 100;
            elements.progressFill.style.width = `${progress}%`;
        }

        function updateStats() {
            const cardIds = state.cards.map((_, idx) => `${state.currentUnit}-${idx}`);
            const known = cardIds.filter(id => state.known.has(id)).length;
            const learning = cardIds.filter(id => state.learning.has(id)).length;
            const remaining = state.cards.length - known - learning;

            elements.knownCount.textContent = known;
            elements.learningCount.textContent = learning;
            elements.remainingCount.textContent = remaining;
        }

        function nextCard() {
            state.currentIndex = (state.currentIndex + 1) % state.cards.length;
            showCard();
        }

        function markCard(status) {
            const cardId = `${state.currentUnit}-${state.currentIndex}`;

            if (status === 'known') {
                state.known.add(cardId);
                state.learning.delete(cardId);
            } else if (status === 'learning') {
                state.learning.add(cardId);
                state.known.delete(cardId);
            }

            // Save to localStorage
            localStorage.setItem('flashcards_known', JSON.stringify([...state.known]));
            localStorage.setItem('flashcards_learning', JSON.stringify([...state.learning]));

            updateStats();
            nextCard();
        }

        function setupEventListeners() {
            elements.flashcard.addEventListener('click', () => {
                elements.flashcard.classList.toggle('flipped');
            });

            elements.btnKnow.addEventListener('click', () => markCard('known'));
            elements.btnLearning.addEventListener('click', () => markCard('learning'));
            elements.btnNext.addEventListener('click', nextCard);

            elements.unitSelector.addEventListener('click', (e) => {
                if (e.target.classList.contains('unit-btn')) {
                    document.querySelectorAll('.unit-btn').forEach(btn => btn.classList.remove('active'));
                    e.target.classList.add('active');
                    state.currentUnit = e.target.dataset.unit;
                    filterCards();
                    showCard();
                }
            });

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.key === ' ' || e.key === 'Enter') {
                    e.preventDefault();
                    elements.flashcard.classList.toggle('flipped');
                } else if (e.key === 'ArrowRight' || e.key === 'n') {
                    nextCard();
                } else if (e.key === 'k') {
                    markCard('known');
                } else if (e.key === 'l') {
                    markCard('learning');
                }
            });
        }

        init();
    </script>
</body>

</html>
