<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Association Game - Keyword Match</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="association-game.css">
</head>

<body>
    <div class="top-header">
        <div class="logo">
            <span>☁️</span> AWS Association Game
        </div>
        <a href="index.html" class="back-link">← Back to Home</a>
    </div>
    <div class="container">
        <header>
            <h1>Keyword Match Game</h1>
            <p>Which AWS service would you use in each situation?</p>
        </header>
        <!-- Setup Screen -->
        <div class="game-setup" id="gameSetup">
            <h2>Choose a unit to start</h2>
            <div class="unit-selection" id="unitSelection">
                <!-- Generated by JS -->
            </div>
            <button class="start-btn" id="startGame">Start Game</button>
        </div>
        <!-- Active Game -->
        <div class="game-active" id="gameActive">
            <div class="game-header">
                <div class="game-stats">
                    <div class="stat">
                        <div class="stat-value" id="questionNum">1</div>
                        <div class="stat-label">Question</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="scoreDisplay">0</div>
                        <div class="stat-label">Points</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="streakDisplay">0</div>
                        <div class="stat-label">🔥 Streak</div>
                    </div>
                </div>
            </div>
            <div class="question-card">
                <div class="scenario" id="scenario"></div>
                <div class="options" id="options">
                    <!-- Generated by JS -->
                </div>
                <div class="feedback" id="feedback">
                    <h3 id="feedbackTitle"></h3>
                    <p id="feedbackText"></p>
                </div>
                <button class="next-btn" id="nextBtn" style="display: none;">→ Next</button>
            </div>
        </div>
        <!-- Results Screen -->
        <div class="results" id="results">
            <h2>Game Complete!</h2>
            <div class="score-circle">
                <div class="score-text" id="finalScore">0%</div>
            </div>
            <div class="results-summary">
                <div class="result-stat correct">
                    <div class="result-value" id="correctCount">0</div>
                    <div class="result-label">✓ Correct</div>
                </div>
                <div class="result-stat incorrect">
                    <div class="result-value" id="incorrectCount">0</div>
                    <div class="result-label">✗ Incorrect</div>
                </div>
                <div class="result-stat accuracy">
                    <div class="result-value" id="accuracyPercent">0%</div>
                    <div class="result-label">Accuracy</div>
                </div>
            </div>
            <div class="action-btns">
                <button class="action-btn btn-restart" id="restartBtn">Same Unit</button>
                <button class="action-btn btn-new" id="newGameBtn">New Unit</button>
            </div>
        </div>
    </div>
    <script src="flashcards-data.js"></script>
    <script>
        const state = {
            selectedUnit: null,
            questions: [],
            currentQuestionIndex: 0,
            score: 0,
            correct: 0,
            incorrect: 0,
            streak: 0,
            maxStreak: 0,
            answered: false
        };

        const elements = {
            gameSetup: document.getElementById('gameSetup'),
            gameActive: document.getElementById('gameActive'),
            results: document.getElementById('results'),
            unitSelection: document.getElementById('unitSelection'),
            startGame: document.getElementById('startGame'),
            questionNum: document.getElementById('questionNum'),
            scoreDisplay: document.getElementById('scoreDisplay'),
            streakDisplay: document.getElementById('streakDisplay'),
            scenario: document.getElementById('scenario'),
            options: document.getElementById('options'),
            feedback: document.getElementById('feedback'),
            feedbackTitle: document.getElementById('feedbackTitle'),
            feedbackText: document.getElementById('feedbackText'),
            nextBtn: document.getElementById('nextBtn'),
            finalScore: document.getElementById('finalScore'),
            correctCount: document.getElementById('correctCount'),
            incorrectCount: document.getElementById('incorrectCount'),
            accuracyPercent: document.getElementById('accuracyPercent'),
            restartBtn: document.getElementById('restartBtn'),
            newGameBtn: document.getElementById('newGameBtn')
        };

        function init() {
            renderUnitSelection();
            setupEventListeners();
        }

        function renderUnitSelection() {
            const unitCounts = {};
            flashcardsData.forEach(item => {
                unitCounts[item.unit] = (unitCounts[item.unit] || 0) + 1;
            });

            elements.unitSelection.innerHTML = Object.entries(unitCounts).map(([unit, count]) => `
                <div class="unit-card" data-unit="${unit}">
                    <h3>${unit}</h3>
                    <p>${count} questions</p>
                </div>
            `).join('');
        }

        function startGame() {
            if (!state.selectedUnit) {
                alert('Please select a unit first');
                return;
            }

            // Filter and prepare questions
            const unitData = flashcardsData.filter(item => item.unit === state.selectedUnit);
            state.questions = shuffle(unitData).slice(0, 10); // 10 questions per game

            state.currentQuestionIndex = 0;
            state.score = 0;
            state.correct = 0;
            state.incorrect = 0;
            state.streak = 0;

            elements.gameSetup.style.display = 'none';
            elements.gameActive.style.display = 'block';
            elements.results.style.display = 'none';

            showQuestion();
        }

        function showQuestion() {
            if (state.currentQuestionIndex >= state.questions.length) {
                showResults();
                return;
            }

            state.answered = false;
            const question = state.questions[state.currentQuestionIndex];

            // Create scenario text with highlighted keyword
            const scenarioText = question.hint || `Which service would you use when you need: ${question.keyword}?`;
            elements.scenario.innerHTML = scenarioText.replace(
                new RegExp(question.keyword, 'gi'),
                `<span class="keyword-highlight">${question.keyword}</span>`
            );

            // Generate options (correct + 3 random wrong answers)
            const wrongOptions = flashcardsData
                .filter(item => item.service !== question.service && item.unit === state.selectedUnit)
                .sort(() => Math.random() - 0.5)
                .slice(0, 3);

            const allOptions = shuffle([question, ...wrongOptions]);

            elements.options.innerHTML = allOptions.map((opt, idx) => `
                <div class="option" data-service="${opt.service}" data-correct="${opt.service === question.service}">
                    <div class="option-service">${opt.service}</div>
                    <div class="option-hint">${opt.description.substring(0, 60)}...</div>
                </div>
            `).join('');

            elements.feedback.classList.remove('show', 'correct', 'incorrect');
            elements.nextBtn.style.display = 'none';

            // Update header
            elements.questionNum.textContent = state.currentQuestionIndex + 1;
            elements.scoreDisplay.textContent = state.score;
            elements.streakDisplay.textContent = state.streak;
        }

        function checkAnswer(selectedOption) {
            if (state.answered) return;
            state.answered = true;

            const isCorrect = selectedOption.dataset.correct === 'true';
            const question = state.questions[state.currentQuestionIndex];

            // Mark all options
            document.querySelectorAll('.option').forEach(opt => {
                opt.classList.add('disabled');
                if (opt.dataset.correct === 'true') {
                    opt.classList.add('correct');
                }
            });

            if (isCorrect) {
                selectedOption.classList.add('correct');
                state.correct++;
                state.score += 10 + (state.streak * 2); // Bonus for streak
                state.streak++;
                state.maxStreak = Math.max(state.maxStreak, state.streak);

                elements.feedback.classList.add('show', 'correct');
                elements.feedbackTitle.textContent = '🎉 Correct!';
                elements.feedbackText.textContent = question.description;
            } else {
                selectedOption.classList.add('incorrect');
                state.incorrect++;
                state.streak = 0;

                elements.feedback.classList.add('show', 'incorrect');
                elements.feedbackTitle.textContent = '❌ Incorrect';
                elements.feedbackText.textContent = `The correct answer is ${question.service}. ${question.description}`;
            }

            elements.scoreDisplay.textContent = state.score;
            elements.streakDisplay.textContent = state.streak;
            elements.nextBtn.style.display = 'block';
        }

        function nextQuestion() {
            state.currentQuestionIndex++;
            showQuestion();
        }

        function showResults() {
            elements.gameActive.style.display = 'none';
            elements.results.style.display = 'block';

            const accuracy = state.questions.length > 0
                ? Math.round((state.correct / state.questions.length) * 100)
                : 0;

            elements.finalScore.textContent = `${accuracy}%`;
            elements.correctCount.textContent = state.correct;
            elements.incorrectCount.textContent = state.incorrect;
            elements.accuracyPercent.textContent = `${accuracy}%`;
        }

        function restartGame() {
            startGame();
        }

        function newGame() {
            state.selectedUnit = null;
            document.querySelectorAll('.unit-card').forEach(card => card.classList.remove('selected'));
            elements.gameSetup.style.display = 'block';
            elements.gameActive.style.display = 'none';
            elements.results.style.display = 'none';
        }

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function setupEventListeners() {
            elements.unitSelection.addEventListener('click', (e) => {
                const card = e.target.closest('.unit-card');
                if (card) {
                    document.querySelectorAll('.unit-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                    state.selectedUnit = card.dataset.unit;
                }
            });

            elements.startGame.addEventListener('click', startGame);

            elements.options.addEventListener('click', (e) => {
                const option = e.target.closest('.option');
                if (option && !state.answered) {
                    checkAnswer(option);
                }
            });

            elements.nextBtn.addEventListener('click', nextQuestion);
            elements.restartBtn.addEventListener('click', restartGame);
            elements.newGameBtn.addEventListener('click', newGame);
        }

        init();
    </script>
</body>

</html>
